<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>全網社群訊噪分離</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050b14; color: #e0e6ed; font-family: 'Segoe UI', Roboto, sans-serif; }
        .glass-card { background: rgba(16, 33, 65, 0.6); border: 1px solid rgba(56, 189, 248, 0.2); backdrop-filter: blur(12px); border-radius: 12px; margin-bottom: 20px; }
        .card-header { background: rgba(13, 35, 57, 0.8); border-bottom: 1px solid rgba(56, 189, 248, 0.2); color: #38bdf8; font-weight: bold; }
        .post-card { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 15px; margin-bottom: 10px; border-radius: 6px; }
        .signal-post { border-left: 4px solid #4ade80; background: rgba(16, 33, 65, 0.4); }
        .noise-post { border-left: 4px solid #64748b; opacity: 0.5; filter: grayscale(0.8); }
        .stat-val { font-size: 4rem; font-weight: bold; line-height: 1; }
        .btn-back { border: 1px solid #38bdf8; color: #38bdf8; text-decoration: none; padding: 5px 15px; border-radius: 20px; }
        .post-link { color: white; text-decoration: none; font-weight: 500; transition: 0.2s; display: block; }
        .post-link:hover { color: #38bdf8; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-white"><i class="fas fa-satellite-dish text-info"></i> 全網社群訊噪分離</h2>
            <a href="/" class="btn btn-back">返回</a>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4 text-center">
                    <div class="text-muted mb-2 fs-5">市場整體 AI 輿情情緒分數</div>
                    <div class="stat-val my-2" id="sentiment-score">--</div>
                    <div id="sentiment-status" class="mt-2 fs-4 badge bg-dark border border-secondary px-4 py-2 mb-3">載入中...</div>
                    
                    <div id="sentiment-reason" class="text-warning mt-2" style="font-size: 1.15rem; max-width: 800px; margin: 0 auto; letter-spacing: 1px;">
                        正在彙整全球市場情報...
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-7">
                <div class="glass-card h-100">
                    <div class="card-header text-success"><span><i class="fas fa-wifi"></i> 有效訊號 (Signals)</span> <span class="badge bg-success" id="signal-count-badge">0</span></div>
                    <div class="card-body" id="signal-stream" style="height: 600px; overflow-y: auto;"></div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="glass-card h-100">
                    <div class="card-header text-muted"><span><i class="fas fa-filter"></i> 已過濾噪音 (Noise)</span> <span class="badge bg-secondary" id="noise-count-badge">0</span></div>
                    <div class="card-body" id="noise-stream" style="height: 600px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchSocialData() {
            try {
                const response = await fetch('/api/social-data');
                const data = await response.json();
                
                document.getElementById('signal-count-badge').innerText = data.signal_count;
                document.getElementById('noise-count-badge').innerText = data.noise_count;

                const scoreEl = document.getElementById('sentiment-score');
                scoreEl.innerText = data.sentiment_score;
                const statusEl = document.getElementById('sentiment-status');
                
                // 更新情緒狀態
                if(data.sentiment_score > 20) { 
                    scoreEl.style.color = '#4ade80'; statusEl.innerText = "貪婪 (Greed)"; statusEl.className = "mt-2 fs-4 badge bg-success px-4 py-2 mb-3"; 
                } else if(data.sentiment_score < -20) { 
                    scoreEl.style.color = '#fb7185'; statusEl.innerText = "恐慌 (Fear)"; statusEl.className = "mt-2 fs-4 badge bg-danger px-4 py-2 mb-3"; 
                } else { 
                    scoreEl.style.color = '#e0e6ed'; statusEl.innerText = "中立 (Neutral)"; statusEl.className = "mt-2 fs-4 badge bg-secondary px-4 py-2 mb-3"; 
                }

                // 👉 將後端算出的「AI 理由」顯示在畫面上
                document.getElementById('sentiment-reason').innerText = data.sentiment_reason || "無法取得 AI 理由分析";

                renderPosts('signal-stream', data.signals, 'signal-post');
                renderPosts('noise-stream', data.noises, 'noise-post');
            } catch (e) { console.error("Error fetching data:", e); }
        }

        function renderPosts(containerId, posts, className) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (posts.length === 0) {
                if (className === 'signal-post') {
                    container.innerHTML = `<div class="text-center text-muted py-5" style="border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px;"><i class="fas fa-search-dollar fa-3x mb-3 text-secondary"></i><br><h5 class="text-white">目前無高價值訊號</h5><small>AI 正在過濾全球來源中...</small></div>`;
                } else {
                    container.innerHTML = `<div class="text-center text-muted py-5">暫無噪音數據</div>`;
                }
                return;
            }

            posts.forEach(post => {
                let badge = post.sentiment === 'BULLISH' ? '<span class="badge bg-success">看多</span>' : (post.sentiment === 'BEARISH' ? '<span class="badge bg-danger">看空</span>' : '');
                
                let qScore = post.quality_score;
                let qColor = qScore >= 80 ? 'text-warning border-warning' : 'text-primary border-primary';
                let scoreBadge = className === 'signal-post' ? `<span class="badge bg-transparent ${qColor} border ms-1" title="Quality Score">Q: ${qScore}</span>` : '';
                
                let aiSummaryText = post.ai_summary || "AI 正在分析內容...";
                let aiSummary = className === 'signal-post' ? `<div class="mt-2 p-2 rounded small text-info" style="background: rgba(56, 189, 248, 0.1);"><i class="fas fa-robot me-1"></i> ${aiSummaryText}</div>` : '';
                
                let sourceBadge = '';
                if (post.source === 'CNYES') sourceBadge = `<span class="badge bg-info text-dark me-2">鉅亨網</span>`;
                else if (post.source === 'BlockTempo') sourceBadge = `<span class="badge bg-warning text-dark me-2">動區</span>`;
                else if (post.source === 'CoinDesk') sourceBadge = `<span class="badge bg-primary text-white me-2"><i class="fas fa-globe"></i> CoinDesk</span>`;
                else sourceBadge = `<span class="badge bg-dark border border-secondary text-muted me-2">PTT</span>`;

                let titleHtml = post.title;
                if(className === 'signal-post') {
                    ["情報", "新聞", "分析", "BTC", "ETH", "ETF"].forEach(kw => {
                        titleHtml = titleHtml.replace(new RegExp(kw, 'gi'), `<span class="text-warning fw-bold">${kw}</span>`);
                    });
                }

                container.innerHTML += `
                    <div class="post-card ${className}">
                        <div class="d-flex justify-content-between small text-muted mb-1">
                            <div class="d-flex align-items-center">${sourceBadge} <span>${post.author}</span></div>
                            <div>${badge} ${scoreBadge}</div>
                        </div>
                        <h5 class="mt-1 mb-2" style="font-size: 1.1rem;"><a href="${post.link}" target="_blank" class="post-link">${titleHtml}</a></h5>
                        ${aiSummary}
                        <div class="d-flex justify-content-between align-items-center mt-2 text-muted small">
                            <span>${post.date}</span><span>${post.push} 熱度</span>
                        </div>
                    </div>`;
            });
        }
        
        fetchSocialData(); 
        setInterval(fetchSocialData, 10000);
    </script>
</body>
</html>
